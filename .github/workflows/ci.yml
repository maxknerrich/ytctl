name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package
      - run: npm run lint:firefox
      - uses: actions/upload-artifact@v7
        with:
          name: ytctl-browser-builds-${{ github.sha }}
          path: |
            dist/ytctl-firefox-*.zip
            dist/ytctl-chrome-*.zip
